[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "18"
  GIT_SUBMODULE_STRATEGY = "none"

[[redirects]]
  from   = "/api/feed"
  to     = "/.netlify/functions/feed"
  status = 200

[[redirects]]
  from   = "/api/meta"
  to     = "/.netlify/functions/meta"
  status = 200

[[redirects]]
  from   = "/api/price"
  to     = "/.netlify/functions/price"
  status = 200

[[redirects]]
  from   = "/api/sector"
  to     = "/.netlify/functions/sector"
  status = 200

[[redirects]]
  from   = "/api/short-interest"
  to     = "/.netlify/functions/short-interest"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
