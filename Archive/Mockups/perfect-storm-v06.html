/* ─── STORM SCORE ENGINE ────────────────────────────────────────────────────── */
const PILL_WEIGHT = { active: 1.0, emerging: 0.6, fading: 0.25 };

function calcStormScores(pills) {
  const scoreOneSide = (ps) => {
    if (!ps.length) return 0;
    const uniqueCats = new Set(ps.map(p => p.cat)).size;
    const diversityMult = 1 + (uniqueCats - 1) * 0.28;
    const base = ps.reduce((s, p) => s + (PILL_WEIGHT[p.state] ?? 0.5), 0);
    return Math.min(100, Math.round(base * diversityMult * 16));
  };
  const riskScore = scoreOneSide(pills.filter(p => p.dir === "risk"));
  const oppScore  = scoreOneSide(pills.filter(p => p.dir === "opp"));
  const tensionBonus = (riskScore > 25 && oppScore > 25)
    ? Math.round(Math.min(riskScore, oppScore) * 0.2) : 0;
  return { riskScore, oppScore, stormScore: riskScore + oppScore + tensionBonus };
}

/* ─── WAVE CANVAS ────────────────────────────────────────────────────────────── */
// Scores derived from pills: active=1.0, emerging=0.5, fading=0.2 → scaled 0–100.
// Both waves always rendered — red amplitude ∝ riskScore, green ∝ oppScore.
// Waves are centered (v05 aesthetic) so contrast is visually intuitive.
const PILL_W = { active: 1.0, emerging: 0.5, fading: 0.2 };

/* ─── TOGGLE SLIDER ──────────────────────────────────────────────────────────── */
function Toggle({ on, onToggle }) {
  return (
    <div onClick={onToggle} style={{
      width:36, height:20, borderRadius:10, cursor:"pointer", flexShrink:0,
      background: on ? C.opp : "#1A2E4A",

      position:"relative", transition:"background 0.15s",
    }}>
      <div style={{
        position:"absolute", top:2,
        left: on ? 17 : 2,
        width:14, height:14, borderRadius:"50%",
        background: on ? "#FFFFFF" : "#4A6A8A",
        boxShadow:"0 1px 3px rgba(0,0,0,0.5)",
        transition:"left 0.15s",
      }} />
    </div>
  );
}

function pillScores(pills = []) {
  const r = pills.filter(p => p.dir === "risk").reduce((s, p) => s + (PILL_W[p.state] ?? 0.5), 0);
  const o = pills.filter(p => p.dir === "opp" ).reduce((s, p) => s + (PILL_W[p.state] ?? 0.5), 0);
  return { riskScore: Math.min(100, Math.round(r * 28)), oppScore: Math.min(100, Math.round(o * 28)) };
}

// classic=true → v05 style: single dominant wave + optional faint secondary (NationView)
// classic=false (default) → dual-wave: both risk+opp rendered, amplitudes from pill scores (CardView)
function WaveBar({ pills = [], riskScore: rsProp, oppScore: osProp, classic = false }) {
  const canvasRef    = useRef(null);
  const rafRef       = useRef(null);
  const phaseRef     = useRef(0);
  const waveAnimOn   = React.useContext(WaveAnimCtx);

  const { riskScore, oppScore } = (rsProp != null || osProp != null)
    ? { riskScore: rsProp ?? 0, oppScore: osProp ?? 0 }
    : pillScores(pills);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    const calm = riskScore < 8 && oppScore < 8;
    const intensity = Math.max(riskScore, oppScore) / 100;

    // ── CLASSIC mode (NationView) — v05 original: dominant fill + faint secondary ──
    if (classic) {
      const rDom  = riskScore >= oppScore;
      const amp   = calm ? 1.2 : 3 + intensity * 13;
      const freq  = 0.018 + intensity * 0.008;
      const speed = calm ? 0.003 : 0.012 + intensity * 0.018;
      const draw = () => {
        ctx.clearRect(0, 0, W, H);
        phaseRef.current += speed;
        const phase = phaseRef.current;
        if (calm) {
          ctx.beginPath();
          for (let x = 0; x <= W; x++) {
            const y = H * 0.55 + amp * Math.sin(x * 0.04 + phase);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.strokeStyle = "#2D4A6A"; ctx.lineWidth = 1; ctx.stroke();
          rafRef.current = requestAnimationFrame(draw); return;
        }
        const primCol  = rDom ? C.risk : C.opp;
        const secScore = rDom ? oppScore : riskScore;
        const secCol   = rDom ? C.opp : C.risk;
        ctx.beginPath(); ctx.moveTo(0, H);
        for (let x = 0; x <= W; x++) {
          const y = H * 0.5 + amp * Math.sin(x * freq * Math.PI * 2 + phase) - amp * 0.15;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
        const gr = ctx.createLinearGradient(0, 0, 0, H);
        gr.addColorStop(0, primCol + "55"); gr.addColorStop(1, primCol + "08");
        ctx.fillStyle = gr; ctx.fill();
        ctx.beginPath();
        for (let x = 0; x <= W; x++) {
          const y = H * 0.5 + amp * Math.sin(x * freq * Math.PI * 2 + phase) - amp * 0.15;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = primCol + "BB"; ctx.lineWidth = 1.5; ctx.stroke();
        if (secScore > 22) {
          const sAmp = (secScore / 100) * 5;
          ctx.beginPath();
          for (let x = 0; x <= W; x++) {
            const y = H * 0.65 + sAmp * Math.sin(x * freq * Math.PI * 2 * 1.4 + phase * 0.8 + Math.PI * 0.6);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.strokeStyle = secCol + "60"; ctx.lineWidth = 1; ctx.stroke();
        }
        if (waveAnimOn) rafRef.current = requestAnimationFrame(draw);
      };
      draw();
      return () => cancelAnimationFrame(rafRef.current);
    }

    // ── DUAL mode (CardView) ──
    // Both waves rise from the same baseline y=H.
    // wY(amp, x) = H - amp*(sin+1)  →  valley always at y=H, crest at y=H-2*amp
    // amp = score*0.5/2  →  wave height = score*0.5 px  (score 100 → 50px).
    // Canvas H=55: score=100 wave peaks at y=5 (5px top margin).
    const riskAmp = calm ? 0 : riskScore * 0.25;
    const oppAmp  = calm ? 0 : oppScore  * 0.25;
    const freq    = 0.018 + intensity * 0.008;
    const speed   = calm ? 0.003 : 0.010 + intensity * 0.016;

    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      phaseRef.current += speed;
      const phase = phaseRef.current;

      if (calm) {
        ctx.beginPath();
        for (let x = 0; x <= W; x++) {
          const y = H - 2 * (Math.sin(x * 0.04 + phase) + 1);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = "#2D4A6A66"; ctx.lineWidth = 1; ctx.stroke();
        if (waveAnimOn) rafRef.current = requestAnimationFrame(draw); return;
      }

      const [domAmp, domCol, secAmp, secCol] = riskAmp >= oppAmp
        ? [riskAmp, C.risk, oppAmp, C.opp]
        : [oppAmp, C.opp, riskAmp, C.risk];

      // Both rise from y=H; valley always at H, crest at H - 2*amp
      const wY = (amp, x) => H - amp * (Math.sin(x * freq * Math.PI * 2 + phase) + 1);

      // 1. Dominant: fill surface → H, gradient from crest downward
      if (domAmp > 1.5) {
        const crest = H - 2 * domAmp;
        ctx.beginPath(); ctx.moveTo(0, H);
        for (let x = 0; x <= W; x++) ctx.lineTo(x, wY(domAmp, x));
        ctx.lineTo(W, H); ctx.closePath();
        const gD = ctx.createLinearGradient(0, crest, 0, H);
        gD.addColorStop(0, domCol + "60"); gD.addColorStop(1, domCol + "08");
        ctx.fillStyle = gD; ctx.fill();
        ctx.beginPath();
        for (let x = 0; x <= W; x++) {
          const y = wY(domAmp, x);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = domCol + "CC"; ctx.lineWidth = 1.5; ctx.stroke();
      }

      // 2. Secondary: stroke only — no fill so dominant proportions stay readable
      if (secAmp > 1.5) {
        ctx.beginPath();
        for (let x = 0; x <= W; x++) {
          const y = wY(secAmp, x);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = secCol + "CC"; ctx.lineWidth = 1.5; ctx.stroke();
      }

      if (waveAnimOn) rafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(rafRef.current);
  }, [riskScore, oppScore, classic, waveAnimOn]);

  // All hooks called above — safe to conditionally render nothing
  if (!waveAnimOn) return null;

  return <canvas ref={canvasRef} width={600} height={55} style={{width:"100%",height:55,display:"block"}} />;
}

  GPOL:   "GEOPOLITICAL",
  POL:    "POLITICAL",
  MACRO:  "MACROECONOMIC",
  SECT:   "SECTOR",
  GEO:    "GEOGRAPHIC",

};

function Pill({ dir, cat, label, state, compact, isNew }) {
  const isRisk = dir === "risk";
  const col    = isRisk ? C.risk : C.opp;
  const bg     = isRisk ? "#3B0A0A" : "#052e16";
  const opacity = state === "fading" ? 0.55 : state === "emerging" ? 0.75 : 1;
  const desc   = label.includes(":") ? label.split(":").slice(1).join(":").trim() : label;

  /* ── SHORT — collapsed card view: just the category code ── */
  if (compact) {
    return (
      <span style={{
        display:"inline-flex", alignItems:"center", gap:4,
        padding:"2px 7px", fontSize:11, fontFamily:C.mono,
        fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase",
        background: isNew ? col + "33" : bg, color: col, opacity,
        border: `1px solid ${isNew ? col : col + "44"}`,
        flexShrink:0,
      }}>
        {isRisk ? "!" : "+"} {CAT_NAMES[cat] ?? cat}
        {state === "emerging" && <span style={{fontSize:9,opacity:.7}}>◌</span>}
        {state === "fading"   && <span style={{fontSize:9,opacity:.7}}>↓</span>}
        {isNew                && <span style={{fontSize:9,color:col}}>●</span>}
      </span>
    );
  }

  /* ── LONG — expanded view: full category name + signal description ── */
  return (
    <div style={{
      display:"flex", alignItems:"center", gap:6,
      padding:"4px 10px", fontSize:12, fontFamily:C.mono,
      fontWeight:500, letterSpacing:"0.05em",
      background: bg, color: col, opacity,
      border: `1px solid ${col}33`,
      flexShrink:0,
    }}>
      <span style={{fontSize:11, fontWeight:700}}>{isRisk ? "⚠" : "✦"}</span>
      <span style={{color:"#94A3B8", fontSize:11, marginRight:1}}>{CAT_NAMES[cat] ?? cat}</span>
      <span>{desc}</span>
      {state === "emerging" && <span style={{fontSize:11, marginLeft:4, opacity:.7}}>◌ EMERGING</span>}
      {state === "fading"   && <span style={{fontSize:11, marginLeft:4, opacity:.7}}>↓ FADING</span>}
    </div>
  );
}

/* ─── STOCK CARD ─────────────────────────────────────────────────────────────── */
function StockCard({ stock, expanded, onToggle, newTickers }) {
  const prevailing = stock.pills.filter(p => p.state === "active").slice(0, 6);
  const rDom = stock.riskScore >= stock.oppScore;
  const stormLabel = (() => {
    const diff = Math.abs(stock.riskScore - stock.oppScore);
    if (stock.riskScore < 20 && stock.oppScore < 20) return { text:"CALM", col:C.textDim };
    if (diff < 15) return { text:"TENSION", col:C.warn };
    return rDom
      ? { text:`RISK ×${stock.pills.filter(p=>p.dir==="risk").length}`, col:C.risk }
      : { text:`OPP ×${stock.pills.filter(p=>p.dir==="opp").length}`,   col:C.opp };
  })();
  const hasNewSignal = newTickers?.includes(stock.ticker);

  return (
    <div style={{
      background: C.bgCard,
      border: `1px solid ${hasNewSignal ? C.accent + "88" : C.border}`,
      marginBottom:8, overflow:"hidden", flexShrink:0,
      transition:"border-color 0.5s",
    }}>
      <div onClick={onToggle} style={{
        display:"flex", flexDirection:"column", cursor:"pointer",
        background: expanded ? C.bgCard2 : C.bgCard,
        borderBottom: expanded ? `1px solid ${C.border}` : "none",
        transition:"background .18s", userSelect:"none",
      }}>
        {/* Title row — [chevron] [TICKER  Company Name …] [price / change] */}
        {/* Height is set by the price+change column on the right */}
        <div style={{display:"flex", alignItems:"center", padding:"0 12px 0 0", minHeight:44, gap:0}}>
          {/* Chevron */}
          <div style={{width:36, alignSelf:"stretch", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <polyline
                points={expanded ? "2,3.5 5,6.5 8,3.5" : "3.5,2 6.5,5 3.5,8"}
                stroke="#8899AA" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"
              />
            </svg>
          </div>
          {/* Ticker symbol + company name on one baseline row */}
          <div style={{flex:1, display:"flex", alignItems:"baseline", gap:7, overflow:"hidden", minWidth:0, padding:"13px 0"}}>
            <span style={{fontFamily:C.inst, fontSize:25, fontWeight:700, color:"#FFFFFF", letterSpacing:"-0.01em", flexShrink:0}}>
              {stock.ticker}
            </span>
            {hasNewSignal && (
              <span style={{fontFamily:C.mono, fontSize:10, color:C.accent, letterSpacing:"0.1em",
                background:C.accent+"22", border:`1px solid ${C.accent}44`, padding:"1px 5px", flexShrink:0}}>
                NEW SIGNAL
              </span>
            )}
            <span style={{fontFamily:C.sans, fontSize:13, color:"#94A3B8", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
              {stock.name}
            </span>
          </div>
          {/* Price + change — stacked, determines row height */}
          <div style={{textAlign:"right", flexShrink:0, display:"flex", flexDirection:"column", justifyContent:"center", gap:4, padding:"10px 0"}}>
            <div style={{fontFamily:C.mono, fontSize:14, color:"#FFFFFF", fontWeight:600, lineHeight:1}}>{stock.price}</div>
            <div style={{fontFamily:C.mono, fontSize:11, color: stock.pos ? C.opp : C.risk, letterSpacing:"0.06em", lineHeight:1}}>{stock.change}</div>
          </div>
        </div>
        {/* Pill row */}
        {!expanded && prevailing.length > 0 && (
          <div style={{display:"flex", gap:4, flexWrap:"wrap", padding:"0 12px 20px 36px"}}>
            {prevailing.map((p, i) => <Pill key={i} {...p} compact isNew={hasNewSignal && i === 0} />)}
          </div>
        )}
      </div>

      {/* WaveBar: collapsed state — sits below header/pills */}
      {!expanded && <div style={{paddingBottom:20}}><WaveBar riskScore={stock.riskScore} oppScore={stock.oppScore} /></div>}

      {expanded && (
        <div style={{padding:"12px 14px 0", borderTop:`1px solid ${C.border}`}}>

/* ─── CARDS VIEW ─────────────────────────────────────────────────────────────── */
function CardsView({ newTickers, secsSince, numCols }) {
  const [expanded, setExpanded] = useState(new Set(["DAL"]));
  const [sort, setSort]         = useState("storm");
  const [filter, setFilter]     = useState("all");
  // Per-column search terms (one entry per column, grows with numCols)
  const [colSearch, setColSearch] = useState(["", "", ""]);

  const setColQ = (ci, q) => setColSearch(prev => {
    const next = [...prev];
    while (next.length <= ci) next.push("");
    next[ci] = q;
    return next;
  });

  const toggle = (t) => setExpanded(p => {
    const n = new Set(p); n.has(t) ? n.delete(t) : n.add(t); return n;
  });

  // Sorted list applies only global sort + filter; per-column search is applied in each column
  const sorted = [...STOCKS]
    .filter(s =>
      filter === "all"  ? true :
      filter === "risk" ? s.riskScore > 30 :
      filter === "opp"  ? s.oppScore  > 30 :
      filter === "calm" ? s.riskScore < 20 && s.oppScore < 20 : true
    )
    .sort((a, b) => {
      if (filter === "risk" || sort === "risk") {
        const ac = a.pills.filter(p => p.dir === "risk").length;
        const bc = b.pills.filter(p => p.dir === "risk").length;
        return bc !== ac ? bc - ac : b.riskScore - a.riskScore;
      }
      if (filter === "opp" || sort === "opp") {
        const ac = a.pills.filter(p => p.dir === "opp").length;
        const bc = b.pills.filter(p => p.dir === "opp").length;
        return bc !== ac ? bc - ac : b.oppScore - a.oppScore;
      }
      return b.stormScore - a.stormScore;
    });

  const btnStyle = (active) => ({
    fontFamily:C.mono, fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase",
    padding:"4px 10px", border:`1px solid ${active ? C.accent : C.border2}`,
    background: active ? C.accent + "22" : "transparent",
    color: active ? C.accent : "#94A3B8", cursor:"pointer",
  });

  return (
    <div style={{flex:1, overflow:"hidden", display:"flex", flexDirection:"column"}}>
      <div style={{
        display:"flex", alignItems:"center", gap:12, padding:"8px 16px",
        background:C.navLeft, borderBottom:`1px solid ${C.border}`, flexShrink:0,
      }}>
        <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim, letterSpacing:"0.1em"}}>SORT</span>
        {[["storm","STORM"],["risk","RISK"],["opp","OPP"]].map(([k,v]) => (
          <button key={k} onClick={() => setSort(k)} style={btnStyle(sort===k)}>{v}</button>
        ))}
        <div style={{width:1, height:16, background:C.border, margin:"0 4px"}} />
        <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim, letterSpacing:"0.1em"}}>FILTER</span>
        {[["all","ALL"],["risk","RISK"],["opp","OPP"],["calm","CALM"]].map(([k,v]) => (
          <button key={k} onClick={() => setFilter(k)} style={btnStyle(filter===k)}>{v}</button>
        ))}
        <span style={{marginLeft:"auto", fontFamily:C.mono, fontSize:11, color:C.textDim}}>
          {sorted.length} stocks
        </span>
        <span style={{fontFamily:C.mono, fontSize:11, color: secsSince < 3 ? C.opp : C.textDim, transition:"color 0.5s"}}>
          {secsSince < 3 ? "● UPDATED" : `↻ ${secsSince}s ago`}
        </span>
      </div>
      {/* ── Columns (each has its own search bar pinned at top) ── */}
      <div style={{flex:1, display:"flex", overflow:"hidden", marginTop:8}}>
        {Array.from({length: numCols}, (_, ci) => {
          const q = (colSearch[ci] ?? "").toLowerCase().trim();
          const colStocks = sorted
            .filter((_, idx) => idx % numCols === ci)
            .filter(s => {
              if (!q) return true;
              const { riskScore, oppScore } = pillScores(s.pills);
              // Direction shortcuts: "risk", "opp", "storm" (both)
              if (q === "risk")  return riskScore > 0;
              if (q === "opp" || q === "opportunity") return oppScore > 0;
              if (q === "storm") return riskScore > 0 && oppScore > 0;
              // Score range: r>50  o<30  r>=70  etc.
              const rm = q.match(/^([ro])([<>]=?)(\d+)$/);
              if (rm) {
                const score = rm[1] === "r" ? riskScore : oppScore;
                const n = parseInt(rm[3]);
                if (rm[2] === ">")  return score > n;
                if (rm[2] === ">=") return score >= n;
                if (rm[2] === "<")  return score < n;
                if (rm[2] === "<=") return score <= n;
              }
              // Default text match
              return s.ticker.toLowerCase().includes(q) ||
                     s.name.toLowerCase().includes(q) ||
                     (s.sector ?? "").toLowerCase().includes(q) ||
                     s.pills.some(p => p.label.toLowerCase().includes(q));
            });
          return (
            <div key={ci} style={{
              flex:1, display:"flex", flexDirection:"column", overflow:"hidden",
              borderRight: ci < numCols - 1 ? `1px solid ${C.border}33` : "none",
            }}>
              {/* ── Column header card — fllwup-style sticky topic zone ── */}
              <div style={{
                background: C.bgCard2,
                border: `1px solid ${C.border}`,
                marginBottom: 10, marginTop: 8, marginLeft: 8, marginRight: 8,
                flexShrink: 0,
                position: "sticky", top: 0, zIndex: 10,
              }}>
                <div style={{height:36, display:"flex", alignItems:"stretch"}}>
                  {/* # prefix — accent color */}
                  <div style={{
                    width:32, display:"flex", alignItems:"center", justifyContent:"center",
                    flexShrink:0, color:C.accent, fontFamily:C.mono, fontSize:15, fontWeight:700,
                    borderRight:`1px solid ${C.border}`, cursor:"default", userSelect:"none",
                  }}>#</div>
                  {/* Search input */}
                  <input
                    type="text"
                    value={colSearch[ci] ?? ""}
                    onChange={e => setColQ(ci, e.target.value)}
                    placeholder="ticker · sector · risk · opp · r>50…"
                    style={{
                      flex:1, background:"transparent", border:"none", color:C.text,
                      fontFamily:C.mono, fontSize:12, padding:"0 8px",
                      outline:"none", caretColor:C.accent,
                    }}
                  />
                  {/* Clear × — only when query is non-empty */}
                  {colSearch[ci] ? (
                    <button onClick={() => setColQ(ci, "")} style={{
                      width:30, background:"transparent",
                      border:"none", borderLeft:`1px solid ${C.border}`,
                      color:C.textDim, cursor:"pointer", fontFamily:C.mono,
                      fontSize:12, flexShrink:0,
                    }}>✕</button>
                  ) : null}
                  {/* + add button — accent blue square, rightmost */}
                  <button
                    title="Add ticker"
                    style={{
                      width:36, height:36, background:C.accent, border:"none",
                      borderLeft:`1px solid ${C.border}`, cursor:"pointer",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      flexShrink:0, transition:"background .15s",
                    }}
                    onMouseEnter={e => e.currentTarget.style.background="#0284C7"}
                    onMouseLeave={e => e.currentTarget.style.background=C.accent}
                  >
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
                      stroke="#fff" strokeWidth="2.5" strokeLinecap="round">
                      <line x1="7" y1="2" x2="7" y2="12"/>
                      <line x1="2" y1="7" x2="12" y2="7"/>
                    </svg>
                  </button>
                </div>
              </div>
              {/* Cards */}
              <div style={{flex:1, overflowY:"auto", padding:"0 8px 10px"}}>
                {colStocks.map(s => (
                  <StockCard
                    key={s.ticker}
                    stock={s}
                    expanded={expanded.has(s.ticker)}
                    onToggle={() => toggle(s.ticker)}
                    newTickers={newTickers}
                  />
                ))}
                {colStocks.length === 0 && (
                  <div style={{
                    fontFamily:C.mono, fontSize:11, color:C.textDim,
                    padding:"16px 4px", textAlign:"center", letterSpacing:"0.06em",
                  }}>— no match —</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── STORM VIEW HELPERS ─────────────────────────────────────────────────────── */

// ── Surround geometry constants ───────────────────────────────────────────────
// All spacing is measured from element EDGES, not centres.
const INNER_PAD   = 20;  // uniform standoff: surround boundary sits 20px outside every pill edge
const TICKER_HW   = 22;  // ticker pill half-width
const TICKER_HH   = 11;  // ticker pill half-height
const LABEL_H     = 20;  // cluster label height
const CIRC_THRESH = 0.67; // slider value where circle hands off to organic blob
const SNAP_X      = 60;  // horizontal grid step between adjacent pill centres
const SNAP_Y      = 36;  // vertical grid step (TICKER_PH + 14px gap)

// Canonical surround bounding box — single source of truth used by both
// surroundPath (shape geometry) and resolveLabels (label clamping).
// Box is the MINIMUM rectangle that contains all ticker pill edges plus INNER_PAD
// clearance on every side, and also reserves top space for the label.
function clusterSurroundBox(c, nodes, pad = INNER_PAD) {
  const pts = c.members.map(t => nodes[t]).filter(Boolean);
  if (pts.length === 0) {
    return { minX: c.cx - c.rx, maxX: c.cx + c.rx, minY: c.cy - c.ry, maxY: c.cy + c.ry };
  }

  // Bounding box from pill EDGES + pad (tension-controlled)
  let minX = Math.min(...pts.map(p => p.x - TICKER_HW)) - pad;
  let maxX = Math.max(...pts.map(p => p.x + TICKER_HW)) + pad;
  let minY = Math.min(...pts.map(p => p.y - TICKER_HH)) - pad;
  let maxY = Math.max(...pts.map(p => p.y + TICKER_HH)) + pad;

  // Expand width so the label always fits horizontally with pad on each side
  const labelW = c.label.length * 6.8 + 14;
  const needW  = labelW + 2 * pad;
  if (maxX - minX < needW) {
    const bcx = (minX + maxX) / 2;
    minX = bcx - needW / 2;
    maxX = bcx + needW / 2;
  }

  // Reserve top space: pad + label height + pad gap to first ticker.
  // This guarantees the label fits at the top without overlapping any ticker.
  const labelReserve = pad + LABEL_H + pad;
  const topmostEdge  = Math.min(...pts.map(p => p.y - TICKER_HH));
  const neededTop    = topmostEdge - labelReserve;
  if (minY > neededTop) minY = neededTop;

  return { minX, maxX, minY, maxY };
}

// Andrew's monotone-chain convex hull.
// Returns hull vertices in order (CW in SVG y-down).
function convexHull(pts) {
  if (pts.length < 3) return pts.slice();
  const s = pts.slice().sort((a, b) => a.x !== b.x ? a.x - b.x : a.y - b.y);
  const h = [];
  // lower pass
  for (const p of s) {
    while (h.length >= 2) {
      const a = h[h.length-2], b = h[h.length-1];
      if ((b.x-a.x)*(p.y-a.y)-(b.y-a.y)*(p.x-a.x) <= 0) h.pop(); else break;
    }
    h.push(p);
  }
  // upper pass
  const lo = h.length + 1;
  for (let i = s.length - 2; i >= 0; i--) {
    const p = s[i];
    while (h.length >= lo) {
      const a = h[h.length-2], b = h[h.length-1];
      if ((b.x-a.x)*(p.y-a.y)-(b.y-a.y)*(p.x-a.x) <= 0) h.pop(); else break;
    }
    h.push(p);
  }
  h.pop(); // first == last
  return h;
}

// Surround path generator — four zones on a 0–1 slider:
//   0.00 → rect     sharp rectangle
//   0.33 → radius   rounded rectangle
//   0.67 → circle   perfect 4-arc cubic circle
//   1.00 → organic  minimal-surface hull: convex hull of pill corners,
//                   uniform pad offset (surface tension), rounded corners
// Uses clusterSurroundBox geometry so shape and label clamping are always in sync.
function surroundPath(cx, cy, rx, ry, organicness, memberNodes = [], labelText = "", pad = INNER_PAD, labelRect = null) {
  // ── Bounding box: single source of truth — delegate to clusterSurroundBox logic ──
  // Build a synthetic cluster descriptor so we can reuse clusterSurroundBox exactly.
  let minX, maxX, minY, maxY;
  if (memberNodes.length > 0) {
    minX = Math.min(...memberNodes.map(n => n.x - TICKER_HW)) - pad;
    maxX = Math.max(...memberNodes.map(n => n.x + TICKER_HW)) + pad;
    minY = Math.min(...memberNodes.map(n => n.y - TICKER_HH)) - pad;
    maxY = Math.max(...memberNodes.map(n => n.y + TICKER_HH)) + pad;
    // Reserve top space for label
    const topmostEdge = Math.min(...memberNodes.map(n => n.y - TICKER_HH));
    const neededTop   = topmostEdge - (pad + LABEL_H + pad);
    if (minY > neededTop) minY = neededTop;
    // ── guarantee the path is wide enough to contain the label text ───────────
    if (labelText) {
      const labelW = labelText.length * 6.8 + 14;
      const needW  = labelW + 2 * pad;
      if (maxX - minX < needW) {
        const bcxTmp = (minX + maxX) / 2;
        minX = bcxTmp - needW / 2;
        maxX = bcxTmp + needW / 2;
      }
    }
  } else {
    minX = cx - rx; maxX = cx + rx;
    minY = cy - ry; maxY = cy + ry;
  }
  const bcx = (minX + maxX) / 2, bcy = (minY + maxY) / 2;
  const halfW = (maxX - minX) / 2, halfH = (maxY - minY) / 2;
  const f = v => v.toFixed(1);

  // ── MINIMAL-SURFACE HULL (organicness > CIRC_THRESH) ─────────────────────
  // Physical model: convex hull of all pill corners + label area, offset
  // outward by pad (uniform surface tension), corners rounded to a fixed radius.
  // No random noise — shape is purely determined by contents.
  if (organicness > CIRC_THRESH && memberNodes.length > 0) {
    // 1. Collect corners of every ticker pill
    const rawPts = [];
    memberNodes.forEach(n => {
      rawPts.push({x: n.x - TICKER_HW, y: n.y - TICKER_HH});
      rawPts.push({x: n.x + TICKER_HW, y: n.y - TICKER_HH});
      rawPts.push({x: n.x + TICKER_HW, y: n.y + TICKER_HH});
      rawPts.push({x: n.x - TICKER_HW, y: n.y + TICKER_HH});
    });

    // 2. Add virtual points for the label zone.
    //    If labelRect is provided (from the resolved + dragged label position) we use
    //    it directly so the surround always keeps exactly `pad` clearance from the label.
    //    Otherwise fall back to the centroid-above-pills default.
    if (labelText) {
      let llx, lly, llw, llh;
      if (labelRect) {
        llx = labelRect.x; lly = labelRect.y; llw = labelRect.w; llh = labelRect.h;
      } else {
        llw = labelText.length * 6.8 + 14;
        llh = LABEL_H;
        const lcx = memberNodes.reduce((s, n) => s + n.x, 0) / memberNodes.length;
        llx = lcx - llw / 2;
        lly = Math.min(...memberNodes.map(n => n.y - TICKER_HH)) - llh - pad;
      }
      // Four corners of the label rect, each pushed out by pad → surround wraps with uniform gap
      rawPts.push({x: llx - pad,       y: lly - pad});
      rawPts.push({x: llx + llw + pad, y: lly - pad});
      rawPts.push({x: llx - pad,       y: lly + llh});
      rawPts.push({x: llx + llw + pad, y: lly + llh});
    }

    // 3. Convex hull of all those points
    const hull = convexHull(rawPts);
    const hn   = hull.length;
    if (hn < 3) { /* fall through to rect */ } else {

    // 4. Offset each hull vertex radially outward from hull centroid by pad.
    //    This gives the uniform-tension "soap film" standoff from pill edges.
    const hcx = hull.reduce((s, p) => s + p.x, 0) / hn;
    const hcy = hull.reduce((s, p) => s + p.y, 0) / hn;
    const rawOhull = hull.map(p => {
      const dx = p.x - hcx, dy = p.y - hcy;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      return {x: p.x + dx/len * pad, y: p.y + dy/len * pad};
    });

    // 4b. Smooth transition: blend hull verts toward bounding circle as organicness
    //     approaches CIRC_THRESH from above. blend=0 → verts sit on circle (matches
    //     circle mode exactly); blend=1 → full organic positions.
    const blend  = Math.min(1, (organicness - CIRC_THRESH) / (1 - CIRC_THRESH));
    const circR  = Math.max(halfW, halfH);
    const ohull  = rawOhull.map(p => {
      const angle = Math.atan2(p.y - bcy, p.x - bcx);
      const ex = bcx + circR * Math.cos(angle);
      const ey = bcy + circR * Math.sin(angle);
      return {x: ex + blend * (p.x - ex), y: ey + blend * (p.y - ey)};
    });

    // 4c. Minimum hull height — prevent degenerate flat shapes for single-row clusters
    const minHullH = 2 * (TICKER_HH + pad);
    const ohullTop = Math.min(...ohull.map(p => p.y));
    const ohullBot = Math.max(...ohull.map(p => p.y));
    if (ohullBot - ohullTop < minHullH) {
      const expand = (minHullH - (ohullBot - ohullTop)) / 2;
      const midY   = (ohullTop + ohullBot) / 2;
      ohull.forEach(p => { p.y += p.y >= midY ? expand : -expand; });
    }

    // 5. Build SVG path: straight edges with quadratic-bezier rounded corners.
    //    Corner radius blends from circR (at transition) to PILL_RX+pad (full organic).
    const PILL_RX = TICKER_HH;
    const cRad    = (PILL_RX + pad) * blend + circR * (1 - blend);
    const fp = v => v.toFixed(1);

    // Pre-compute the "from" and "to" tangent cut-points for each vertex
    const fromPts = [], toPts = [];
    for (let i = 0; i < hn; i++) {
      const prev = ohull[(i - 1 + hn) % hn];
      const curr = ohull[i];
      const next = ohull[(i + 1) % hn];
      const d1x = curr.x - prev.x, d1y = curr.y - prev.y;
      const l1  = Math.sqrt(d1x*d1x + d1y*d1y) || 1;
      const d2x = next.x - curr.x, d2y = next.y - curr.y;
      const l2  = Math.sqrt(d2x*d2x + d2y*d2y) || 1;
      const t   = Math.min(cRad, l1 * 0.42, l2 * 0.42);
      fromPts.push({x: curr.x - d1x/l1 * t, y: curr.y - d1y/l1 * t});
      toPts.push({x: curr.x + d2x/l2 * t, y: curr.y + d2y/l2 * t});
    }

    // Emit: M fromPts[0], then for each vertex: Q vertex toPts[i], L fromPts[i+1], Z
    let d = `M ${fp(fromPts[0].x)} ${fp(fromPts[0].y)}`;
    for (let i = 0; i < hn; i++) {
      const v  = ohull[i];
      const ni = (i + 1) % hn;
      d += ` Q ${fp(v.x)} ${fp(v.y)} ${fp(toPts[i].x)} ${fp(toPts[i].y)}`;
      if (ni !== 0) d += ` L ${fp(fromPts[ni].x)} ${fp(fromPts[ni].y)}`;
      // last toPts[hn-1] → fromPts[0] is handled by Z (straight close)
    }
    return d + ' Z';

    } // end hn >= 3
  }

  // ── CIRCLE / ROUNDED RECT (organicness 0 → CIRC_THRESH) ──────────────────
  const t = organicness / CIRC_THRESH; // remap 0–0.67 → 0–1

  if (t > 0.985) {
    const r = Math.max(halfW, halfH), k = 0.5522847498 * r;
    return [`M ${f(bcx)},${f(bcy-r)}`,
      `C ${f(bcx+k)},${f(bcy-r)} ${f(bcx+r)},${f(bcy-k)} ${f(bcx+r)},${f(bcy)}`,
      `C ${f(bcx+r)},${f(bcy+k)} ${f(bcx+k)},${f(bcy+r)} ${f(bcx)},${f(bcy+r)}`,
      `C ${f(bcx-k)},${f(bcy+r)} ${f(bcx-r)},${f(bcy+k)} ${f(bcx-r)},${f(bcy)}`,
      `C ${f(bcx-r)},${f(bcy-k)} ${f(bcx-k)},${f(bcy-r)} ${f(bcx)},${f(bcy-r)} Z`].join(' ');
  }

  const cr = t * Math.min(halfW, halfH);
  const L = bcx - halfW, R = bcx + halfW, T = bcy - halfH, B = bcy + halfH;
  return [
    `M ${f(L+cr)},${f(T)}`, `L ${f(R-cr)},${f(T)}`,
    cr > 0.5 ? `Q ${f(R)},${f(T)} ${f(R)},${f(T+cr)}` : `L ${f(R)},${f(T)}`,
    `L ${f(R)},${f(B-cr)}`,
    cr > 0.5 ? `Q ${f(R)},${f(B)} ${f(R-cr)},${f(B)}` : `L ${f(R)},${f(B)}`,
    `L ${f(L+cr)},${f(B)}`,
    cr > 0.5 ? `Q ${f(L)},${f(B)} ${f(L)},${f(B-cr)}` : `L ${f(L)},${f(B)}`,
    `L ${f(L)},${f(T+cr)}`,
    cr > 0.5 ? `Q ${f(L)},${f(T)} ${f(L+cr)},${f(T)}` : `L ${f(L)},${f(T)}`,
    `Z`,
  ].join(' ');
}

// Gravity: ALL cluster members pulled toward their cluster center(s).
// Single-cluster stocks pull toward their one cluster cx/cy (keeps surround tight).
// Multi-cluster stocks pull toward average of their cluster centers.

/* ─── STORM VIEW LABEL COLLISION RESOLVER ───────────────────────────────────── */
// Each element (ticker pill, cluster label) carries invisible ELEM_PAD padding.
// Labels are repositioned iteratively until no padded bounding boxes overlap.
const TICKER_PW = 44, TICKER_PH = 22; // ticker pill pixel dimensions
const ELEM_PAD  = 5;                   // invisible padding around every element

function resolveLabels(clusters, nodes, pad = INNER_PAD) {
  // Pre-compute surround boxes — same boxes used by surroundPath
  const boxes = clusters.map(c => clusterSurroundBox(c, nodes, pad));

  // Clamp helper: keep label fully inside its own surround box at all times.
  // Called after EVERY push so a label is always in a valid position before
  // the next collision check runs.
  function clamp(lbl, box) {
    lbl.x = Math.max(box.minX + pad, Math.min(lbl.x, box.maxX - lbl.w - pad));
    lbl.y = Math.max(box.minY + pad, Math.min(lbl.y, box.maxY - lbl.h - pad));
  }

  // Initial placement: top-centre inside surround, immediately clamped
  const labels = clusters.map((c, i) => {
    const w = c.label.length * 6.8 + 14;
    const h = LABEL_H;
    const box = boxes[i];
    const lbl = { x: (box.minX + box.maxX) / 2 - w / 2, y: box.minY + pad, w, h };
    clamp(lbl, box);
    return lbl;
  });

  const G = ELEM_PAD; // gap around each element

  // Pre-compute each label's ideal top-center resting position for gravity pull
  const ideals = labels.map((lbl, i) => ({
    x: (boxes[i].minX + boxes[i].maxX) / 2 - lbl.w / 2,
    y: boxes[i].minY + pad,
  }));

  for (let iter = 0; iter < 50; iter++) {
    // Pass A: push each label away from tickers that could actually overlap it.
    // ── FIX: only test tickers whose pill rect can reach inside the surround box.
    // Foreign tickers outside the box cannot overlap a clamped label — skipping
    // them prevents phantom pushes that pin labels to surround walls.
    labels.forEach((lbl, li) => {
      const box = boxes[li];
      for (const pos of Object.values(nodes)) {
        if (!pos) continue;
        // Fast reject: ticker pill can't reach inside this surround → skip
        if (pos.x + TICKER_HW + G < box.minX || pos.x - TICKER_HW - G > box.maxX) continue;
        if (pos.y + TICKER_HH + G < box.minY || pos.y - TICKER_HH - G > box.maxY) continue;
        const tx1 = pos.x - TICKER_PW / 2 - G, ty1 = pos.y - TICKER_PH / 2 - G;
        const tx2 = pos.x + TICKER_PW / 2 + G, ty2 = pos.y + TICKER_PH / 2 + G;
        const lx1 = lbl.x - G, ly1 = lbl.y - G;
        const lx2 = lbl.x + lbl.w + G, ly2 = lbl.y + lbl.h + G;
        if (lx1 >= tx2 || lx2 <= tx1 || ly1 >= ty2 || ly2 <= ty1) continue;
        const dx = (lbl.x + lbl.w / 2) - pos.x;
        const dy = (lbl.y + lbl.h / 2) - pos.y;
        const overlapX = Math.min(lx2 - tx1, tx2 - lx1);
        const overlapY = Math.min(ly2 - ty1, ty2 - ly1);
        if (overlapX < overlapY) lbl.x += dx >= 0 ? overlapX : -overlapX;
        else                     lbl.y += dy >= 0 ? overlapY : -overlapY;
        clamp(lbl, box);
      }
    });

    // Pass B: push labels away from each other.
    // Both sides clamped immediately so neither escapes its own surround.
    for (let i = 0; i < labels.length; i++) {
      for (let j = i + 1; j < labels.length; j++) {
        const a = labels[i], b = labels[j];
        const ax1 = a.x - G, ay1 = a.y - G, ax2 = a.x + a.w + G, ay2 = a.y + a.h + G;
        const bx1 = b.x - G, by1 = b.y - G, bx2 = b.x + b.w + G, by2 = b.y + b.h + G;
        if (ax1 >= bx2 || ax2 <= bx1 || ay1 >= by2 || ay2 <= by1) continue;
        const dx = (b.x + b.w / 2) - (a.x + a.w / 2);
        const dy = (b.y + b.h / 2) - (a.y + a.h / 2);
        const overlapX = Math.min(ax2 - bx1, bx2 - ax1) / 2;
        const overlapY = Math.min(ay2 - by1, by2 - ay1) / 2;
        if (overlapX < overlapY) {
          a.x -= dx >= 0 ? overlapX : -overlapX;
          b.x += dx >= 0 ? overlapX : -overlapX;
        } else {
          a.y -= dy >= 0 ? overlapY : -overlapY;
          b.y += dy >= 0 ? overlapY : -overlapY;
        }
        clamp(a, boxes[i]);
        clamp(b, boxes[j]);
      }
    }

    // Pass C: gravity — gently pull each label toward its ideal top-center position.
    const pullStr = 0.10 + (iter / 50) * 0.04; // 0.10 → 0.14 over 50 iters
    labels.forEach((lbl, li) => {
      lbl.x += (ideals[li].x - lbl.x) * pullStr;
      lbl.y += (ideals[li].y - lbl.y) * pullStr;
      clamp(lbl, boxes[li]);
    });

    // Pass D: soft repulsion — keep labels 20px clear of foreign surround boundaries.
    // Uses each cluster's bounding box as a proxy for its surround edge.
    // Applied softly (30% per iter) so it converges gradually without fighting Pass C.
    labels.forEach((lbl, li) => {
      boxes.forEach((fbox, fj) => {
        if (fj === li) return;
        // Expand label rect by pad to enforce standoff from foreign box
        const lx1 = lbl.x - pad, lx2 = lbl.x + lbl.w + pad;
        const ly1 = lbl.y - pad, ly2 = lbl.y + lbl.h + pad;
        if (lx1 >= fbox.maxX || lx2 <= fbox.minX || ly1 >= fbox.maxY || ly2 <= fbox.minY) return;
        const lcx = lbl.x + lbl.w / 2, lcy = lbl.y + lbl.h / 2;
        const fcx = (fbox.minX + fbox.maxX) / 2, fcy = (fbox.minY + fbox.maxY) / 2;
        const dx = lcx - fcx, dy = lcy - fcy;
        const overlapX = Math.min(lx2 - fbox.minX, fbox.maxX - lx1);
        const overlapY = Math.min(ly2 - fbox.minY, fbox.maxY - ly1);
        if (overlapX < overlapY) lbl.x += (dx >= 0 ? overlapX : -overlapX) * 0.3;
        else                     lbl.y += (dy >= 0 ? overlapY : -overlapY) * 0.3;
        clamp(lbl, boxes[li]); // own surround clamp wins — label can't escape
      });
    });
  }

  // Viewport clamp — prevent labels overflowing canvas right/bottom edge
  labels.forEach((lbl, li) => {
    lbl.x = Math.max(4, Math.min(lbl.x, 1596 - lbl.w));
    lbl.y = Math.max(4, Math.min(lbl.y, 756 - lbl.h));
  });

  return labels; // [{ x, y, w, h }, ...]
}

/* ─── STORM VIEW ─────────────────────────────────────────────────────────────── */
function StormView() {
  const [selected,    setSelected]    = useState(null);
  const [organicness, setOrganicness] = useState(0.67);
  const [gravity,     setGravity]     = useState(0.40);
  const [showAll,     setShowAll]     = useState(false);
  const selectedStock = STOCKS.find(s => s.ticker === selected);
  const svgRef = useRef(null);
  const svgW = 1600, svgH = 760;

  // Zoom + pan state
  const [vb, setVb] = useState({x:0, y:0, w:svgW, h:svgH});
  const panRef  = useRef(null); // { startX, startY, vbAtStart }
  const dragRef = useRef(null); // { type:'pill'|'label', ... }
  const [isPanning,    setIsPanning]    = useState(false);
  const [innerPad,     setInnerPad]     = useState(20);   // surround standoff px — shared by pills AND label zone
  const [labelOffsets, setLabelOffsets] = useState({});   // {clusterId: {dx,dy}} — user-dragged label overrides

  // Zoom via wheel
  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    const handler = (e) => {
      e.preventDefault();
      const rect = el.getBoundingClientRect();
      const mx   = (e.clientX - rect.left)  / rect.width  * vb.w + vb.x;
      const my   = (e.clientY - rect.top)   / rect.height * vb.h + vb.y;
      const fac  = e.deltaY > 0 ? 1.13 : 0.88;
      const nw   = Math.max(180, vb.w * fac);
      const nh   = nw * (svgH / svgW);
      setVb({ x: mx - (mx - vb.x) * (nw / vb.w), y: my - (my - vb.y) * (nh / vb.h), w: nw, h: nh });
    };
    el.addEventListener('wheel', handler, {passive:false});
    return () => el.removeEventListener('wheel', handler);
  }, [vb]);

  // Convert client pointer → SVG canvas coords (respects current viewBox zoom/pan)
  const clientToSVG = (e) => {
    const rect = svgRef.current.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) / rect.width  * vb.w + vb.x,
      y: (e.clientY - rect.top)  / rect.height * vb.h + vb.y,
    };
  };

  // Unified mouse handlers — pill drag / label drag / canvas pan
  const onMouseDown = (e) => {
    if (e.target.closest('[data-ticker]')) return; // pill onMouseDown handles its own drag
    if (e.target.closest('[data-label]'))  return; // label onMouseDown handles its own drag
    panRef.current = { startX: e.clientX, startY: e.clientY, vbAtStart: {...vb} };
    setIsPanning(true);
  };
  const onMouseMove = (e) => {
    const dr = dragRef.current;

    // ── Pill drag ──────────────────────────────────────────────────────────────
    if (dr?.type === 'pill') {
      const sv = clientToSVG(e);
      let nx = dr.startPos.x + (sv.x - dr.startSVG.x);
      let ny = dr.startPos.y + (sv.y - dr.startSVG.y);

      // Spring constraint: shared pills are pulled toward mean cluster centre
      const sharing = dr.sharedClusters;
      if (sharing.length >= 2) {
        const k   = Math.min(0.75, 0.35 * (sharing.length - 1));
        const scx = sharing.reduce((s, c) => s + c.cx, 0) / sharing.length;
        const scy = sharing.reduce((s, c) => s + c.cy, 0) / sharing.length;
        nx = nx + (scx - nx) * k;
        ny = ny + (scy - ny) * k;
      }

      // Barrier: pill cannot cross into a surround that doesn't claim it.
      // For each foreign cluster, clamp the pill to sit outside its surround box.
      for (const fc of CLUSTERS) {
        if (fc.members.includes(dr.ticker)) continue; // own clusters — no barrier
        const fbox = clusterSurroundBox(fc, nodes, innerPad);
        const px1 = nx - TICKER_HW, px2 = nx + TICKER_HW;
        const py1 = ny - TICKER_HH, py2 = ny + TICKER_HH;
        if (px1 >= fbox.maxX || px2 <= fbox.minX || py1 >= fbox.maxY || py2 <= fbox.minY) continue;
        // Pill is inside foreign box — push to nearest face
        const pushL = px2 - fbox.minX, pushR = fbox.maxX - px1;
        const pushU = py2 - fbox.minY, pushD = fbox.maxY - py1;
        const min   = Math.min(pushL, pushR, pushU, pushD);
        if      (min === pushL) nx = fbox.minX - TICKER_HW;
        else if (min === pushR) nx = fbox.maxX + TICKER_HW;
        else if (min === pushU) ny = fbox.minY - TICKER_HH;
        else                    ny = fbox.maxY + TICKER_HH;
      }

      setNodes(prev => ({ ...prev, [dr.ticker]: { x: nx, y: ny } }));
      return;
    }

    // ── Label drag — clamped inside its own cluster surround ──────────────────
    if (dr?.type === 'label') {
      const sv   = clientToSVG(e);
      const meta = labelMeta[dr.clusterIdx];
      const c    = CLUSTERS[dr.clusterIdx];
      // Proposed absolute top-left position of the label rect
      let newLx = meta.x + dr.startOffset.dx + (sv.x - dr.startSVG.x);
      let newLy = meta.y + dr.startOffset.dy + (sv.y - dr.startSVG.y);

      // Hard barrier: title cannot overlap any ticker pill (ELEM_PAD gap enforced)
      const G = ELEM_PAD;
      for (const pos of Object.values(nodes)) {
        if (!pos) continue;
        const tx1 = pos.x - TICKER_PW/2 - G, tx2 = pos.x + TICKER_PW/2 + G;
        const ty1 = pos.y - TICKER_PH/2 - G, ty2 = pos.y + TICKER_PH/2 + G;
        const lx1 = newLx, lx2 = newLx + meta.w;
        const ly1 = newLy, ly2 = newLy + meta.h;
        if (lx1 >= tx2 || lx2 <= tx1 || ly1 >= ty2 || ly2 <= ty1) continue;
        const pushL = lx2 - tx1, pushR = tx2 - lx1;
        const pushU = ly2 - ty1, pushD = ty2 - ly1;
        const min = Math.min(pushL, pushR, pushU, pushD);
        if      (min === pushL) newLx = tx1 - meta.w;
        else if (min === pushR) newLx = tx2;
        else if (min === pushU) newLy = ty1 - meta.h;
        else                    newLy = ty2;
      }

      // Hard barrier: label cannot cross into any foreign surround boundary
      for (const fc of CLUSTERS) {
        if (fc.id === dr.clusterId) continue;
        const fbox = clusterSurroundBox(fc, nodes, innerPad);
        const lx1 = newLx, lx2 = newLx + meta.w;
        const ly1 = newLy, ly2 = newLy + meta.h;
        if (lx1 >= fbox.maxX || lx2 <= fbox.minX || ly1 >= fbox.maxY || ly2 <= fbox.minY) continue;
        // Inside foreign box — push to nearest face
        const pushL = lx2 - fbox.minX, pushR = fbox.maxX - lx1;
        const pushU = ly2 - fbox.minY, pushD = fbox.maxY - ly1;
        const min   = Math.min(pushL, pushR, pushU, pushD);
        if      (min === pushL) newLx = fbox.minX - meta.w;
        else if (min === pushR) newLx = fbox.maxX;
        else if (min === pushU) newLy = fbox.minY - meta.h;
        else                    newLy = fbox.maxY;
      }
      // Own-surround clamp wins — label can never leave its cluster regardless of barriers above
      const box = clusterSurroundBox(c, nodes, innerPad);
      newLx = Math.max(box.minX, Math.min(box.maxX - meta.w, newLx));
      newLy = Math.max(box.minY, Math.min(box.maxY - meta.h, newLy));
      setLabelOffsets(prev => ({
        ...prev,
        [dr.clusterId]: { dx: newLx - meta.x, dy: newLy - meta.y },
      }));
      return;
    }

    // ── Canvas pan ─────────────────────────────────────────────────────────────
    if (!panRef.current) return;
    const el = svgRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const scale = vb.w / rect.width;
    const dx = (e.clientX - panRef.current.startX) * scale;
    const dy = (e.clientY - panRef.current.startY) * scale;
    const v0 = panRef.current.vbAtStart;
    setVb({ ...v0, x: v0.x - dx, y: v0.y - dy });
  };
  const onMouseUp = () => { dragRef.current = null; panRef.current = null; setIsPanning(false); };

  // Stock node positions — clean grid per cluster, each ticker placed by the
  // first cluster that lists it. Secondary-cluster surrounds stretch to reach
  // tickers placed elsewhere, which is the "perfect storm overlap" visual.
  //
  // Grid spacing: 60px horizontal, 36px vertical between ticker centers.
  //
  // Cluster ownership:
  //   iran     → RTX LMT XOM NOC          (2×2)
  //   fuel     → DAL AAL UAL ZIM          (2×2)  XOM stretches in from iran
  //   tariff   → AAPL TSLA AMZN WMT ENPH (3+2)  DAL stretches in from fuel
  //   ai       → NVDA MSFT AMD GS LIN AMT (3×2)
  //   china    → TSM                      (solo) NVDA+AMD stretch in from ai
  //   finance2 → JPM MS COIN              (row)  GS stretches in from ai
  //   pharma   → LLY PFE UNH              (row)
  //   etrans   → NEE FCX                  (pair) TSLA+ENPH stretch in from tariff
  //   rareearth→ MP NEM CLF RIO           (2×2)  FCX stretches in from etrans
  //   weather  → MOS ADM CF DE            (2×2)
  //   defense2, aiinfra, shipping — no owned tickers; surrounds span borrowed positions
  const BASE_NODES = {
    // ── DEFENSE (row y=230) ─────────────────────────────────────────────────────
    LMT:{x:100,y:230}, RTX:{x:165,y:230}, NOC:{x:230,y:230}, GD:{x:295,y:230}, BA:{x:360,y:230}, HII:{x:425,y:230},
    // ── ENERGY (row y=370) ──────────────────────────────────────────────────────
    XOM:{x:100,y:370}, CVX:{x:165,y:370}, COP:{x:230,y:370}, SLB:{x:295,y:370}, MPC:{x:360,y:370}, OXY:{x:425,y:370},
    // ── AIRLINES + CLEAN ENERGY (row y=510) ─────────────────────────────────────
    DAL:{x:100,y:510}, AAL:{x:165,y:510}, UAL:{x:230,y:510}, ZIM:{x:295,y:510}, NEE:{x:360,y:510}, ENPH:{x:425,y:510},
    // ── CONSUMER & RETAIL (row y=230) ───────────────────────────────────────────
    AAPL:{x:600,y:230}, TSLA:{x:665,y:230}, AMZN:{x:730,y:230}, WMT:{x:795,y:230}, NKE:{x:860,y:230}, DE:{x:925,y:230},
    // ── FINANCE (row y=370) ─────────────────────────────────────────────────────
    JPM:{x:600,y:370}, GS:{x:665,y:370}, MS:{x:730,y:370}, BAC:{x:795,y:370}, C:{x:860,y:370}, BX:{x:925,y:370},
    // ── FINANCE 2 + DEFENSE IT (row y=510) ──────────────────────────────────────
    COIN:{x:600,y:510}, WFC:{x:665,y:510}, LDOS:{x:730,y:510}, CACI:{x:795,y:510}, AXP:{x:860,y:510}, V:{x:925,y:510},
    // ── MATERIALS & MINING (row y=630) ──────────────────────────────────────────
    NEM:{x:600,y:630}, FCX:{x:665,y:630}, MP:{x:730,y:630}, CLF:{x:795,y:630}, MOS:{x:860,y:630}, CF:{x:925,y:630},
    // ── SEMICONDUCTORS (row y=230, x=1000–1325) ─────────────────────────────────
    NVDA:{x:1000,y:230}, AMD:{x:1065,y:230}, INTC:{x:1130,y:230}, TSM:{x:1195,y:230}, AVGO:{x:1260,y:230}, LIN:{x:1325,y:230},
    // ── SOFTWARE & CLOUD (row y=370, x=1000–1325) ───────────────────────────────
    MSFT:{x:1000,y:370}, GOOGL:{x:1065,y:370}, META:{x:1130,y:370}, ORCL:{x:1195,y:370}, CRM:{x:1260,y:370}, AMT:{x:1325,y:370},
    // ── HEALTHCARE & PHARMA (row y=510, x=1000–1325) ────────────────────────────
    LLY:{x:1000,y:510}, PFE:{x:1065,y:510}, UNH:{x:1130,y:510}, JNJ:{x:1195,y:510}, MRK:{x:1260,y:510}, ABBV:{x:1325,y:510},
  };
  const [nodes, setNodes] = useState(() => ({...BASE_NODES})); // draggable

  // Collision-resolved cluster label positions — recompute when nodes or pad change
  const labelMeta = useMemo(() => resolveLabels(CLUSTERS, nodes, innerPad), [nodes, innerPad]);

  // Which clusters contain each ticker — used for spring constraints on shared pills
  const tickerClusters = useMemo(() => {
    const map = {};
    CLUSTERS.forEach(c => c.members.forEach(m => {
      if (!map[m]) map[m] = [];
      map[m].push(c);
    }));
    return map;
  }, []);

  // Active filter: hide very low storm-score stocks unless showAll
  const visibleTickers = Object.keys(BASE_NODES).filter(t => {
    if (showAll) return true;
    const s = STOCKS.find(s => s.ticker === t);
    return !s || s.stormScore > 18;
  });

  // sliderRow — optional min/max/step/fmt for non-percentage sliders
  const sliderRow = (label, val, setVal, presets, min=0, max=1, step=0.01, fmt=v=>Math.round(v*100)+'%') => (
    <div style={{display:"flex", alignItems:"center", gap:6}}>
      <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim, letterSpacing:"0.1em", minWidth:52}}>{label}</span>

        onChange={e => setVal(Number(e.target.value))}
        style={{width:76, accentColor:C.accent, cursor:"pointer"}}
      />

        {fmt(val)}
      </span>
      <div style={{display:"flex", gap:2}}>
        {presets.map(([v, lbl]) => (
          <button key={v} onClick={() => setVal(v)} style={{
            fontFamily:C.mono, fontSize:10, padding:"2px 5px",
            background: Math.abs(val - v) <= (max-min)*0.06 ? C.accent+"22" : "transparent",
            border:`1px solid ${Math.abs(val - v) <= (max-min)*0.06 ? C.accent : C.border2}`,
            color: Math.abs(val - v) <= (max-min)*0.06 ? C.accent : C.textDim, cursor:"pointer",
          }}>{lbl}</button>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{flex:1, display:"flex", overflow:"hidden"}}>
      <div style={{flex:1, overflow:"hidden", display:"flex", flexDirection:"column"}}>

        {/* ── Controls strip ── */}
        <div style={{
          display:"flex", alignItems:"center", gap:14, padding:"6px 14px", flexShrink:0,
          background:C.bgCard2, borderBottom:`1px solid ${C.border}`, flexWrap:"wrap",
        }}>
          <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim, letterSpacing:"0.1em"}}>SURROUND STYLE</span>
          <div style={{width:1, height:16, background:C.border}} />
          {sliderRow("ORGANIC", organicness, setOrganicness, [[0,"rect"],[0.33,"radius"],[0.67,"circle"],[1,"organic"]])}
          <div style={{width:1, height:16, background:C.border}} />
          {sliderRow("THREADS", gravity, setGravity, [[0,"off"],[0.4,"soft"],[1,"full"]])}
          <div style={{width:1, height:16, background:C.border}} />
          {sliderRow("OFFSET", innerPad, setInnerPad, [[6,"tight"],[20,"normal"],[40,"loose"]], 0, 60, 1, v=>Math.round(v)+'px')}
          <div style={{width:1, height:16, background:C.border}} />
          <button onClick={() => setShowAll(v => !v)} style={{
            fontFamily:C.mono, fontSize:10, padding:"2px 7px", cursor:"pointer",
            background: showAll ? C.accent+"22" : "transparent",
            border:`1px solid ${showAll ? C.accent : C.border2}`,
            color: showAll ? C.accent : C.textDim,
          }}>{showAll ? "ALL TICKERS" : "ACTIVE ONLY"}</button>
          <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim, marginLeft:"auto"}}>
            drag pills · drag labels · scroll to zoom
          </span>
          <button onClick={() => { setNodes({...BASE_NODES}); setLabelOffsets({}); }} style={{
            fontFamily:C.mono, fontSize:10, padding:"2px 7px", cursor:"pointer",
            background:"transparent", border:`1px solid ${C.border2}`, color:C.textDim,
          }}>reset layout</button>
          <button onClick={() => setVb({x:0, y:0, w:svgW, h:svgH})} style={{
            fontFamily:C.mono, fontSize:10, padding:"2px 7px", cursor:"pointer",
            background:"transparent", border:`1px solid ${C.border2}`, color:C.textDim,
          }}>reset zoom</button>
        </div>

        {/* ── SVG map ── */}
        <div style={{flex:1, overflow:"hidden", position:"relative"}}>

          {/* ── LEGEND — fixed HTML overlay, anchored top-left, does not pan/zoom ── */}
          {(() => {
            const items = [
              {col:C.risk,   label:"Risk surround"},
              {col:C.opp,    label:"Opportunity"},
              {col:"#60A5FA",label:"Weather / Climate"},
              {col:C.warn,   label:"Multi-force tension (dashed halo)"},
            ];
            return (
              <div style={{
                position:"absolute", top:10, left:16, zIndex:10,
                pointerEvents:"none", display:"flex", alignItems:"center", gap:10,
              }}>
                <span style={{fontFamily:C.mono, fontSize:9, color:C.textDim, letterSpacing:"0.08em", marginRight:2}}>LEGEND</span>
                {items.map((l, i) => (
                  <div key={i} style={{display:"flex", alignItems:"center", gap:4}}>
                    <div style={{width:8, height:8, background:l.col+"44", border:`1px solid ${l.col}`, borderRadius:1, flexShrink:0}} />
                    <span style={{fontFamily:C.mono, fontSize:9, color:"#94A3B8", whiteSpace:"nowrap"}}>{l.label}</span>
                  </div>
                ))}
              </div>
            );
          })()}

          <svg
            ref={svgRef}
            viewBox={`${vb.x.toFixed(1)} ${vb.y.toFixed(1)} ${vb.w.toFixed(1)} ${vb.h.toFixed(1)}`}
            style={{width:"100%", height:"100%", display:"block", cursor: isPanning ? "grabbing" : "grab", userSelect:"none"}}
            onMouseDown={onMouseDown}
            onMouseMove={onMouseMove}
            onMouseUp={onMouseUp}
            onMouseLeave={onMouseUp}
          >
            <defs>
              {CLUSTERS.map(c => (
                <radialGradient key={c.id} id={`grad-${c.id}`} cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor={c.col} stopOpacity="0.13" />
                  <stop offset="100%" stopColor={c.col} stopOpacity="0.02" />
                </radialGradient>
              ))}
              <filter id="blob-glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="7" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
            </defs>

            {/* ── Cluster surround fills ── */}
            {CLUSTERS.map((c, ci) => {
              const memberPos  = c.members.map(t => nodes[t]).filter(Boolean);
              const off        = labelOffsets[c.id] || {dx:0, dy:0};
              const meta       = labelMeta[ci];
              const labelRect  = meta ? {x: meta.x + off.dx, y: meta.y + off.dy, w: meta.w, h: meta.h} : null;
              return (
                <path key={`fill-${c.id}`}
                  d={surroundPath(c.cx, c.cy, c.rx, c.ry, organicness, memberPos, c.label, innerPad, labelRect)}
                  fill={`url(#grad-${c.id})`}
                  filter="url(#blob-glow)"
                  strokeWidth={0}
                />
              );
            })}

            {/* ── Cluster surround strokes + labels ── */}
            {CLUSTERS.map((c, ci) => {
              const memberPos = c.members.map(t => nodes[t]).filter(Boolean);
              const meta  = labelMeta[ci];
              const off   = labelOffsets[c.id] || {dx:0, dy:0};
              // Label position = resolved position + user drag offset
              const lx    = meta.x + off.dx;
              const ly    = meta.y + off.dy;
              // Pass label rect so surround hull tracks label position exactly
              const labelRect = {x: lx, y: ly, w: meta.w, h: meta.h};
              const path  = surroundPath(c.cx, c.cy, c.rx, c.ry, organicness, memberPos, c.label, innerPad, labelRect);
              const textX = lx + meta.w / 2;
              const textY = ly + 13;
              return (
                <g key={c.id}>
                  <path d={path} fill="none" stroke={c.col} strokeWidth={1.2} strokeOpacity={0.55} />
                  {/* Label — draggable independently of surround */}
                  <g data-label={c.id} style={{cursor:"grab"}}
                    onMouseDown={e => {
                      e.stopPropagation();
                      const sv  = clientToSVG(e);
                      const cur = labelOffsets[c.id] || {dx:0, dy:0};
                      dragRef.current = { type:'label', clusterId:c.id, clusterIdx:ci, startSVG:sv, startOffset:{...cur} };
                    }}
                  >
                    {/* Invisible hit-target with padding */}
                    <rect x={lx - ELEM_PAD} y={ly - ELEM_PAD}
                      width={meta.w + ELEM_PAD*2} height={meta.h + ELEM_PAD*2}
                      fill="transparent" stroke="none" />
                    <rect x={lx} y={ly} width={meta.w} height={meta.h}
                      fill={c.col+"22"} stroke={c.col+"66"} strokeWidth={1} rx={3} />
                    <text x={textX} y={textY}
                      textAnchor="middle" fontFamily={C.mono} fontSize={9.5}
                      fill={c.col} fontWeight="600" letterSpacing="0.04em"
                    >{c.label}</text>
                  </g>
                </g>
              );
            })}

            {/* ── Tension threads ── */}
            {gravity > 0.04 && CLUSTERS.map(c =>
              c.members.flatMap((a, ai) =>
                c.members.slice(ai + 1).map(b => {
                  const pa = nodes[a], pb = nodes[b];
                  if (!pa || !pb) return null;
                  if (!visibleTickers.includes(a) || !visibleTickers.includes(b)) return null;
                  return (
                    <line key={`${a}-${b}-${c.id}`}
                      x1={pa.x} y1={pa.y} x2={pb.x} y2={pb.y}
                      stroke={c.col} strokeWidth={0.5}
                      strokeOpacity={gravity * 0.22} strokeDasharray="3,6"
                    />
                  );
                })
              )
            )}

            {/* ── Ticker nodes ── */}
            {visibleTickers.map(ticker => {
              const pos = nodes[ticker];
              if (!pos) return null;
              const s = STOCKS.find(s => s.ticker === ticker);
              const col = s ? (s.riskScore >= s.oppScore ? C.risk : C.opp) : C.textDim;
              const isSel = selected === ticker;
              const clusterCount = CLUSTERS.filter(c => c.members.includes(ticker)).length;
              const inMultiple = clusterCount > 1;
              return (
                <g key={ticker} data-ticker={ticker}
                  onClick={() => setSelected(isSel ? null : ticker)}
                  style={{cursor:"grab"}}
                  onMouseDown={e => {
                    e.stopPropagation();
                    const sv = clientToSVG(e);
                    dragRef.current = {
                      type: 'pill', ticker,
                      startSVG: sv,
                      startPos: { x: pos.x, y: pos.y },
                      sharedClusters: tickerClusters[ticker] || [],
                    };
                  }}
                >
                  {inMultiple && (
                    <circle cx={pos.x} cy={pos.y} r={20}
                      fill="none" stroke={C.warn}
                      strokeWidth={0.7} strokeOpacity={0.4} strokeDasharray="2,4" />
                  )}
                  {/* Invisible padding rect — enforces ELEM_PAD gap from other elements */}
                  <rect x={pos.x - TICKER_PW/2 - ELEM_PAD} y={pos.y - TICKER_PH/2 - ELEM_PAD}
                    width={TICKER_PW + ELEM_PAD*2} height={TICKER_PH + ELEM_PAD*2}
                    fill="none" stroke="none" />
                  <rect x={pos.x - TICKER_PW/2} y={pos.y - TICKER_PH/2} width={TICKER_PW} height={TICKER_PH}
                    fill={isSel ? col+"44" : C.bgCard2}
                    stroke={col} strokeWidth={isSel ? 2 : 1} rx={TICKER_HH} />
                  <text x={pos.x} y={pos.y+4}
                    textAnchor="middle" fontFamily={C.inst}
                    fontSize={11} fontWeight="700" fill={col} letterSpacing="-0.02em"
                  >{ticker}</text>
                </g>
              );
            })}
          </svg>
        </div>
      </div>

      {/* ── Selected stock detail panel ── */}
      {selectedStock && (
        <div style={{width:300, flexShrink:0, background:C.bgCard, borderLeft:`1px solid ${C.border}`, overflowY:"auto", padding:14}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
            <span style={{fontFamily:C.inst, fontSize:17, fontWeight:700, color:C.text}}>{selectedStock.ticker}</span>
            <button onClick={() => setSelected(null)} style={{background:"none", border:"none", color:C.textDim, cursor:"pointer", fontSize:16, padding:4}}>✕</button>
          </div>
          <div style={{marginBottom:10}}><WaveBar riskScore={selectedStock.riskScore} oppScore={selectedStock.oppScore} classic={true} /></div>
          <div style={{display:"flex", flexDirection:"column", gap:5, marginBottom:12}}>
            <ScoreBar score={selectedStock.riskScore} color={C.risk} label="RISK" />
            <ScoreBar score={selectedStock.oppScore}  color={C.opp}  label="OPP" />
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:4, marginBottom:12}}>
            {selectedStock.pills.map((p, i) => <Pill key={i} {...p} />)}
          </div>
          <div style={{height:1, background:C.border, marginBottom:10}}/>
          {selectedStock.headlines.map((h, i) => (
            <div key={i} style={{display:"flex", gap:6, marginBottom:8}}>
              <span style={{color:C.textDim, fontFamily:C.mono, fontSize:11, marginTop:2}}>→</span>
              <span style={{fontFamily:C.sans, fontSize:13, color:C.textMid, lineHeight:1.5}}>{h}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    : matched.some(r => r.dir === "opp") ? C.opp : C.risk;

  return (
