/* ─── INDEX VIEW ─────────────────────────────────────────────────────────────── */
function IndexView() {
  const [search, setSearch] = React.useState("");

  // Strip the "CAT: " prefix from label — the badge already carries the category
  const shortLabel = (label) => label.includes(":") ? label.split(":").slice(1).join(":").trim() : label;

  const filtered = SIGNAL_RULES.filter(r => {
    if (!search) return true;
    const q = search.toLowerCase();
    return shortLabel(r.label).toLowerCase().includes(q)
      || r.cat.toLowerCase().includes(q)
      || (CAT_NAMES[r.cat] || "").toLowerCase().includes(q)
      || r.tickers.some(t => {
          if (t.toLowerCase().includes(q)) return true;
          const s = STOCKS.find(s => s.ticker === t);
          return s && (s.name.toLowerCase().includes(q) || s.sector.toLowerCase().includes(q));
        });
  });

  const risks = [...filtered.filter(r => r.dir === "risk")]
    .sort((a, b) => shortLabel(a.label).localeCompare(shortLabel(b.label)));
  const opps  = [...filtered.filter(r => r.dir === "opp")]
    .sort((a, b) => shortLabel(a.label).localeCompare(shortLabel(b.label)));

  const Panel = ({ items, dir }) => {
    const col   = dir === "risk" ? C.risk : C.opp;
    const title = dir === "risk" ? "RISKS" : "OPPORTUNITIES";
    return (
      <div style={{width:"50%", flexShrink:0, display:"flex", flexDirection:"column", overflow:"hidden", borderRight: dir === "risk" ? `1px solid ${C.border}` : "none"}}>
        <div style={{
          display:"flex", alignItems:"center",
          padding:"8px 16px", flexShrink:0,
          background:C.navLeft, borderBottom:`1px solid ${C.border}`,
        }}>
          {/* 138px container mirrors the pill column below — title right-aligns to pill's right edge */}
          <div style={{width:138, flexShrink:0, display:"flex", justifyContent:"flex-end"}}>
            <span style={{fontFamily:C.mono, fontSize:11, fontWeight:700, letterSpacing:"0.14em", color:col}}>{title}</span>
          </div>
          <span style={{width:16, flexShrink:0}} />
          <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim}}>{items.length}</span>
        </div>
        <div style={{flex:1, overflowY:"auto", padding:"4px 0"}}>
          {items.map((r, i) => (
            <div key={r.id} style={{
              display:"flex", alignItems:"center",
              padding:"7px 16px",
              borderBottom:`1px solid ${C.border}22`,
              background: i % 2 === 0 ? "transparent" : C.bgCard + "66",
            }}>
              {/* Category badge — fixed-width column keeps label aligned; pill itself is content-width only */}
              <div style={{width:138, flexShrink:0, display:"flex", justifyContent:"flex-end"}}>
                <span style={{
                  fontFamily:C.mono, fontSize:9.5, fontWeight:700, letterSpacing:"0.06em",
                  color:col, background:col+"18", border:`1px solid ${col}44`,
                  padding:"2px 7px", whiteSpace:"nowrap",
                }}>{CAT_NAMES[r.cat] || r.cat}</span>
              </div>
              {/* Gap between badge column and label */}
              <span style={{width:16, flexShrink:0}} />
              <span style={{
                fontFamily:C.sans, fontSize:13, color:C.text, flex:1, minWidth:0,
                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
              }}>{shortLabel(r.label)}</span>
              <div style={{display:"flex", gap:4, flexShrink:0, flexWrap:"wrap", justifyContent:"flex-end", maxWidth:180}}>
                {r.tickers.map(t => (
                  <span key={t} style={{
                    fontFamily:C.mono, fontSize:10, fontWeight:600, letterSpacing:"0.06em",
                    color:"#94A3B8", background:"#1E3A5F66", border:`1px solid ${C.border}`,
                    padding:"1px 5px",
                  }}>{t}</span>
                ))}
              </div>
            </div>
          ))}
          {items.length === 0 && (
            <div style={{padding:"32px 16px", fontFamily:C.mono, fontSize:12, color:C.textDim, textAlign:"center"}}>
              no matches
            </div>
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      <div style={{
        display:"flex", alignItems:"center", gap:12, padding:"8px 16px", flexShrink:0,
        background:C.navLeft, borderBottom:`1px solid ${C.border}`,
      }}>
        <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim, letterSpacing:"0.1em"}}>INDEX</span>
        <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim}}>—</span>
        <span style={{fontFamily:C.sans, fontSize:12, color:C.textMid}}>all signals, a→z</span>
        <input
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="filter by name, category, or ticker…"
          style={{
            marginLeft:"auto", fontFamily:C.mono, fontSize:12, color:C.text,
            background:C.bgCard, border:`1px solid ${C.border}`,
            padding:"4px 10px", width:280, outline:"none",
          }}
        />
      </div>
      <div style={{flex:1, display:"flex", overflow:"hidden"}}>
        <Panel items={risks} dir="risk" />
        <Panel items={opps}  dir="opp"  />
      </div>
    </div>
  );
}

/* ─── SETTINGS PANEL ─────────────────────────────────────────────────────────── */
function SettingsPanel({ onClose, numCols, setNumCols, waveAnim, setWaveAnim, tickerOn, setTickerOn }) {
  return (
    <div style={{
      position:"absolute", top:44, right:0, width:280,
      background:C.bgCard, border:`1px solid ${C.border}`,
      zIndex:100, padding:"12px 14px",
    }}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
        <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim, letterSpacing:"0.1em"}}>SIGNAL ENGINE SETTINGS</span>
        <button onClick={onClose} style={{background:"none", border:"none", color:C.textDim, cursor:"pointer", fontSize:14}}>✕</button>
      </div>

      {/* Card View columns slider */}
      <div style={{padding:"6px 0 8px", borderBottom:`1px solid ${C.border}33`}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
          <span style={{fontFamily:C.sans, fontSize:12, color:C.textMid}}>Card View columns</span>
          <span style={{fontFamily:C.mono, fontSize:13, fontWeight:600, color:C.accent, minWidth:12, textAlign:"right"}}>{numCols}</span>
        </div>
        <div style={{display:"flex", alignItems:"center", gap:6}}>
          <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim}}>3</span>
          <input
            type="range" min={3} max={5} step={1} value={numCols}
            onChange={e => setNumCols(Number(e.target.value))}
            style={{flex:1, accentColor:C.accent, cursor:"pointer"}}
          />
          <span style={{fontFamily:C.mono, fontSize:11, color:C.textDim}}>5</span>
        </div>
        <div style={{display:"flex", justifyContent:"space-between", marginTop:3}}>
          {[3,4,5].map(n => (
            <button key={n} onClick={() => setNumCols(n)} style={{
              fontFamily:C.mono, fontSize:11, padding:"2px 8px",
              background: numCols === n ? C.accent+"22" : "transparent",
              border:`1px solid ${numCols === n ? C.accent : C.border2}`,
              color: numCols === n ? C.accent : C.textDim, cursor:"pointer",
            }}>{n} col</button>
          ))}
        </div>
      </div>

      {/* Display toggles */}
      {[
        ["Wave animation", waveAnim, setWaveAnim],
        ["Ticker tape",    tickerOn, setTickerOn],
      ].map(([label, val, setter]) => (
        <div key={label} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:`1px solid ${C.border}33`}}>
          <span style={{fontFamily:C.sans, fontSize:12, color:C.textMid}}>{label}</span>
          <Toggle on={val} onToggle={() => setter(v => !v)} />
        </div>
      ))}

      {[
        ["Signal refresh interval","15 min"],["Feed sources","8 active"],
        ["Pill auto-decay","enabled"],["Min signal confidence","0.65"],
        ["Storm alert threshold","60"],
      ].map(([k,v]) => (
        <div key={k} style={{display:"flex", justifyContent:"space-between", padding:"5px 0", borderBottom:`1px solid ${C.border}33`}}>
          <span style={{fontFamily:C.sans, fontSize:12, color:C.textMid}}>{k}</span>
          <span style={{fontFamily:C.mono, fontSize:12, color:C.accent}}>{v}</span>
        </div>
      ))}
      <div style={{height:1, background:C.border, margin:"8px 0 4px"}}/>
      <div style={{padding:"4px 0 2px", fontFamily:C.mono, fontSize:11, color:C.textDim, letterSpacing:"0.06em"}}>
        v0.4 · signal engine demo · data: simulated
      </div>
    </div>
  );
}

/* ─── ROOT ───────────────────────────────────────────────────────────────────── */
function PerfectStorm() {
  const [tab, setTab]                   = useState("cards");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [numCols, setNumCols]           = useState(3);
  const [waveAnim, setWaveAnim]         = useState(true);
  const [tickerOn, setTickerOn]         = useState(true);

  // ── Live simulation state ────────────────────────────────────────────────────
  // LIVE_FEED is ordered oldest→newest (index 0 = oldest, 24 = newest).
  // We start with 20 visible and reveal the final 5 over ~60s to demo live tagging.
  const [visibleCount, setVisibleCount] = useState(20);
  const [newItemId, setNewItemId]       = useState(null);
  const [secsSince, setSecsSince]       = useState(0);

  useEffect(() => {
    if (visibleCount >= LIVE_FEED.length) return;
    const t = setTimeout(() => {
      const nextItem = LIVE_FEED[visibleCount];
      setVisibleCount(c => c + 1);
      setNewItemId(nextItem.id);
      setSecsSince(0);
      setTimeout(() => setNewItemId(null), 5000);
    }, 12000);
    return () => clearTimeout(t);
  }, [visibleCount]);

  useEffect(() => {
    const tick = setInterval(() => setSecsSince(s => s + 1), 1000);
    return () => clearInterval(tick);
  }, []);

  const liveItems  = LIVE_FEED.slice(0, visibleCount);
  const newTickers = newItemId ? (LIVE_FEED.find(i => i.id === newItemId)?.tickers ?? []) : [];

  const tabs = [
    { id:"cards",  label:"CARD VIEW" },
    { id:"storm",  label:"STORM VIEW" },
    { id:"nation", label:"NATION VIEW" },
    { id:"feed",   label:"SIGNAL FEED" },
    { id:"index",  label:"INDEX" },
  ];

  return (
    <WaveAnimCtx.Provider value={waveAnim}>
    <div style={{
      height:"100vh", display:"flex", flexDirection:"column",
      background:C.bg, color:C.text, fontFamily:C.sans, overflow:"hidden",
    }}>
      {/* Google Fonts + global styles */}
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:2px}
        button{font-family:inherit}
        @keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
      `}</style>

      {/* ── TICKER TAPE ── */}
      {tickerOn && <TickerTape items={liveItems} />}

      {/* ── NAV BAR ── */}
      <nav style={{
        display:"flex", alignItems:"stretch", flexShrink:0,
        height:40, borderBottom:`1px solid ${C.border}`, position:"relative",
      }}>
        {/* LEFT — logo + tabs */}
        <div style={{flex:1, display:"flex", alignItems:"stretch", background:C.navLeft, paddingLeft:16, gap:0}}>
          <div style={{display:"flex", alignItems:"center", paddingRight:20, borderRight:`1px solid ${C.border}`}}>
            <span style={{fontFamily:C.inst, fontSize:15, fontWeight:700, letterSpacing:"0.1em", color:C.accent}}>PERFECT</span>
            <span style={{fontFamily:C.inst, fontSize:15, fontWeight:700, letterSpacing:"0.1em", color:C.text, marginLeft:4}}>STORM</span>
          </div>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              padding:"0 18px", fontFamily:C.mono, fontSize:12, fontWeight:700,
              letterSpacing:"0.12em", textTransform:"uppercase",
              border:"none", cursor:"pointer", background:"transparent",
              color: tab === t.id ? C.accent : C.textDim,
              borderBottom:`2px solid ${tab === t.id ? C.accent : "transparent"}`,
              transition:"color .15s, border-color .15s",
            }}>{t.label}</button>
          ))}
        </div>

        {/* RIGHT — counters + settings */}
        <div style={{
          background:C.navRight, borderLeft:`1px solid ${C.border}`,
          display:"flex", alignItems:"center", paddingLeft:16, paddingRight:2, gap:8, flexShrink:0, position:"relative",
        }}>
          <div style={{display:"flex", gap:12}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:C.mono, fontSize:16, fontWeight:600, color:C.risk, lineHeight:1}}>{STOCKS.filter(s=>s.riskScore>50).length}</div>
              <div style={{fontFamily:C.mono, fontSize:10, color:C.textDim, letterSpacing:"0.1em"}}>RISK</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:C.mono, fontSize:16, fontWeight:600, color:C.opp, lineHeight:1}}>{STOCKS.filter(s=>s.oppScore>50).length}</div>
              <div style={{fontFamily:C.mono, fontSize:10, color:C.textDim, letterSpacing:"0.1em"}}>OPP</div>
            </div>
          </div>
          <div style={{width:1, height:20, background:C.border, margin:"0 4px"}}/>
          <button onClick={() => setSettingsOpen(v => !v)} style={{
            width:40, height:40, display:"flex", alignItems:"center", justifyContent:"center",
            background: settingsOpen ? C.bgCard2 : "transparent",
            border:"none", cursor:"pointer", color: settingsOpen ? C.accent : C.textDim,
          }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
              <circle cx="8" cy="8" r="2.5"/>
              <path d="M8 1.5v1.3M8 13.2v1.3M1.5 8h1.3M13.2 8h1.3M3.4 3.4l.9.9M11.7 11.7l.9.9M12.6 3.4l-.9.9M4.3 11.7l-.9.9"/>
            </svg>
          </button>
          {settingsOpen && <SettingsPanel onClose={() => setSettingsOpen(false)} numCols={numCols} setNumCols={setNumCols} waveAnim={waveAnim} setWaveAnim={setWaveAnim} tickerOn={tickerOn} setTickerOn={setTickerOn} />}
        </div>
      </nav>

      {/* ── CONTENT ── */}
      <div style={{flex:1, display:"flex", overflow:"hidden"}}>
        {tab === "cards"  && <CardsView newTickers={newTickers} secsSince={secsSince} numCols={numCols} />}
        {tab === "storm"  && <StormView />}
        {tab === "nation" && <NationView />}
        {tab === "feed"   && <FeedView liveItems={liveItems} newItemId={newItemId} />}
        {tab === "index"  && <IndexView />}
      </div>
    </div>
    </WaveAnimCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PerfectStorm />);
</script>
</body>
</html>
